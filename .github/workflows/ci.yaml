# Triggered on every PR — builds and tests RAG API
name: CI — Build and Test

on:
  pull_request:
    branches: [main]
    paths:
      - 'services/rag-api/**'
      - 'services/ingestion/**'

env:
  ACR_NAME: acrllmopsprod
  REGISTRY: acrllmopsprod.azurecr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r services/rag-api/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run unit tests
        run: pytest services/rag-api/tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: services/rag-api
          platforms: linux/amd64        # AKS node architecture
          push: true
          tags: ${{ env.REGISTRY }}/rag-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/rag-api:cache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/rag-api:cache,mode=max

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/rag-api:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1    # Fail CI on critical vulnerabilities