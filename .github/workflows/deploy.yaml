# Triggered on merge to main — deploys to AKS via ArgoCD image update
name: Deploy — Update Image Tag

on:
  push:
    branches: [main]
    paths:
      - 'services/rag-api/**'

env:
  REGISTRY: acrllmopsprod.azurecr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}   # PAT needed to push back to repo

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image
        run: |
          az acr login --name acrllmopsprod
          docker buildx build \
            --platform linux/amd64 \
            -t ${{ env.REGISTRY }}/rag-api:${{ github.sha }} \
            --push services/rag-api/

      - name: Update image tag in deployment manifest
        # ArgoCD watches this file — changing the tag triggers a rollout
        run: |
          sed -i "s|image: .*rag-api:.*|image: ${{ env.REGISTRY }}/rag-api:${{ github.sha }}|" \
            infra/k8s/rag-api/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/rag-api/deployment.yaml
          git commit -m "chore: update rag-api image to ${{ github.sha }}"
          git push