# Helm values for kube-prometheus-stack
# Install: helm install prometheus prometheus-community/kube-prometheus-stack
#          --namespace monitoring --values monitoring/prometheus/values.yaml

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    # Scrape RAG API custom metrics
    additionalScrapeConfigs:
    - job_name: rag-api
      static_configs:
      - targets: ['rag-api-service.llmops.svc.cluster.local:8000']
      metrics_path: /metrics

    - job_name: vllm
      static_configs:
      - targets: ['vllm-service.llmops.svc.cluster.local:8000']
      metrics_path: /metrics

grafana:
  enabled: true
  adminPassword: "LlmOps@Grafana2024!"
  persistence:
    enabled: true
    size: 10Gi

  # Pre-load dashboards from configmap
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: llmops
        orgId: 1
        folder: LLMOps
        type: file
        options:
          path: /var/lib/grafana/dashboards/llmops

alertmanager:
  enabled: true
  config:
    route:
      receiver: slack-notifications
    receivers:
    - name: slack-notifications
      slack_configs:
      - api_url: "" # Set via secret
        channel: "#llmops-alerts"
        title: "{{ .GroupLabels.alertname }}"
        text: "{{ .Annotations.summary }}"