# ArgoCD Application — watches infra/k8s/rag-api/ for changes
# When deployment.yaml image tag changes → triggers rolling update
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-api
  namespace: argocd
  annotations:
    # Auto-sync every 3 minutes
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  source:
    repoURL: https://github.com/Himanshu9001/Azure-LLMOps
    targetRevision: main
    path: infra/k8s/rag-api            # Watches this directory

  destination:
    server: https://kubernetes.default.svc
    namespace: llmops

  syncPolicy:
    automated:
      prune: true                       # Remove deleted resources
      selfHeal: true                    # Revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2