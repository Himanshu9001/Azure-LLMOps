# App of Apps pattern — single ArgoCD app that manages all other apps
# Add new services here — ArgoCD picks them up automatically
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llmops-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Himanshu9001/Azure-LLMOps
    targetRevision: main
    path: infra/k8s/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true