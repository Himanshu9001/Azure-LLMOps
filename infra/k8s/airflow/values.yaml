# infra/k8s/airflow/values.yaml

airflow:
  image:
    repository: acrllmopsprod.azurecr.io/ingestion
    tag: latest

  # KubernetesExecutor — each task runs as its own pod
  # Better isolation and resource control than CeleryExecutor
  executor: KubernetesExecutor

  config:
    AIRFLOW__CORE__PARALLELISM: "32"
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "10"
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"

workers:
  # CPU node pool — ingestion doesn't need GPU
  nodeSelector:
    node-type: cpu
  serviceAccount:
    name: ingestion-sa    # Annotated with workload identity client ID
  tolerations: []

postgresql:
  enabled: false          # Use our Azure PostgreSQL, not bundled one

externalDatabase:
  type: postgres
  host: "{{ postgresql_fqdn }}"
  port: 5432
  database: airflow
  user: llmopsadmin
  passwordSecret: airflow-db-secret